[workspace]
authors = ["OpenAI Codex"]
channels = ["conda-forge"]
name = "triangle-splatting"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
CUDA_HOME = "/usr/local/cuda-12.9"
CC = "/usr/bin/gcc"
CXX = "/usr/bin/g++"
MAX_JOBS = "4"
TORCH_CUDA_ARCH_LIST = "8.9"

[dependencies]
python = "3.11.*"
pip = ">=24,<26"
setuptools = ">=70,<81"
wheel = ">=0.45,<1"
ninja = ">=1.11,<2"
colmap = "==4.0.3"
libfaiss = ">=1.10,<1.11"

[pypi-dependencies]
torch = "==2.4.0"
torchvision = "==0.19.0"
tqdm = "*"
plyfile = "*"
open3d = "*"
lpips = "*"
mediapy = "*"
opencv-python = "*"
rerun-sdk = ">=0.31,<0.32"

[tasks]
build-rasterizer = "python -m pip install --no-build-isolation ./submodules/diff-triangle-rasterization"
build-simple-knn = "python -m pip install --no-build-isolation ./submodules/simple-knn"
colmap-help = "colmap help"
kimera-sfm-vicon-room-1 = "python scripts/run_kimera_pose_colmap_sfm.py --capture-dir /home/mikexyl/workspaces/kimera_ros2_ws/artifacts/vicon_room_1 --mav0-dir /data/euroc/V1_01_easy_raw/mav0 --camera cam0 --matcher sequential --output-dir output/vicon_room_1_kimera_pose_colmap_sfm --copy-images --no-gpu --overwrite"
