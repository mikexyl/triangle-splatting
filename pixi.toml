[workspace]
authors = ["OpenAI Codex"]
channels = ["conda-forge"]
name = "triangle-splatting"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
CUDA_HOME = "/usr/local/cuda-12.9"
CC = "/usr/bin/gcc"
CXX = "/usr/bin/g++"
MAX_JOBS = "4"
TORCH_CUDA_ARCH_LIST = "8.9"

[dependencies]
python = "3.11.*"
pip = ">=24,<26"
setuptools = ">=70,<81"
wheel = ">=0.45,<1"
ninja = ">=1.11,<2"
colmap = "==4.0.3"
libfaiss = ">=1.10,<1.11"

[pypi-dependencies]
torch = "==2.4.0"
torchvision = "==0.19.0"
tqdm = "*"
plyfile = "*"
open3d = "*"
lpips = "*"
mediapy = "*"
opencv-python = "*"
rerun-sdk = ">=0.31,<0.32"

[tasks]
build-rasterizer = "python -m pip install --no-build-isolation ./submodules/diff-triangle-rasterization"
build-simple-knn = "python -m pip install --no-build-isolation ./submodules/simple-knn"
colmap-help = "colmap help"
kimera-sfm-vicon-room-1 = "python scripts/run_kimera_pose_colmap_sfm.py --capture-dir /home/mikexyl/workspaces/kimera_ros2_ws/artifacts/vicon_room_1 --mav0-dir /data/euroc/V1_01_easy_raw/mav0 --camera cam0 --matcher sequential --output-dir output/vicon_room_1_kimera_pose_colmap_sfm --copy-images --no-gpu --overwrite"
kimera-sfm-vicon-room-1-dry-run = "python scripts/run_kimera_pose_colmap_sfm.py --capture-dir /home/mikexyl/workspaces/kimera_ros2_ws/artifacts/vicon_room_1 --mav0-dir /data/euroc/V1_01_easy_raw/mav0 --camera cam0 --matcher sequential --output-dir output/vicon_room_1_kimera_pose_colmap_sfm_dryrun --colmap-executable /bin/echo --copy-images --no-gpu --dry-run --overwrite"
prepare-kimera-mesh-vicon-room-1-reduced = "python scripts/prepare_kimera_capture_dataset.py --capture-dir /home/mikexyl/workspaces/kimera_ros2_ws/artifacts/vicon_room_1 --mav0-dir /data/euroc/V1_01_easy_raw/mav0 --camera cam0 --output-dir output/vicon_room_1_texture_triangle_dataset_reduced --mesh-voxel-size 0.05 --mesh-sample-spacing 0.05 --mesh-triangle-max-edge 0.25 --mesh-triangle-max-count 50000 --mesh-triangle-color-source texture --mesh-triangle-merge-mode voxel --mesh-triangle-merge-voxel-size 0.05"
train-kimera-sfm-vicon-room-1 = "python train.py -s output/vicon_room_1_kimera_pose_colmap_sfm/dataset -m output/vicon_room_1_kimera_pose_colmap_sfm/train --eval --seed_init_mode point"
train-kimera-mesh-vicon-room-1-reduced-2500 = "python train.py -s output/vicon_room_1_texture_triangle_dataset_reduced -m output/vicon_room_1_mesh_triangle_seed_reduced_offline_2500 --eval --seed_init_mode mesh_triangle --iterations 2500 --test_iterations 1 2500 --save_iterations 2500 --densification_interval 999999 --no_dome"
visualize-kimera-sfm-vicon-room-1 = "python scripts/visualize_colmap_sfm_rerun.py --sparse-dir output/vicon_room_1_kimera_pose_colmap_sfm/dataset/sparse/0 --output output/vicon_room_1_kimera_pose_colmap_sfm/colmap_sfm.rrd"
train-help = "python train.py --help"
render-help = "python render.py --help"
metrics-help = "python metrics.py --help"
smoke-cuda = "python -c \"import os, torch; print(f'cuda_home={os.environ.get(\\\"CUDA_HOME\\\")}'); print(f'torch={torch.__version__}'); print(f'torch_cuda={torch.version.cuda}'); print(f'cuda_available={torch.cuda.is_available()}')\""
